<!doctype html>
<html lang="zh-Hans">
  <head>
    <meta charset="utf-8">
    <title>10 分钟决策重置表</title>
    <style>
      @page {
        size: Letter;
        margin: 0.62in;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        color: #111827;
        font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        letter-spacing: 0;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 30px;
        line-height: 1.15;
      }

      p {
        margin: 0 0 12px;
        color: #374151;
        font-size: 13px;
        line-height: 1.55;
      }

      .box {
        min-height: 86px;
        margin: 10px 0;
        padding: 10px 12px;
        border: 1px solid #cbd5e1;
      }

      .box.large {
        min-height: 120px;
      }

      .label {
        color: #111827;
        font-size: 14px;
        font-weight: 800;
      }

      .footer {
        margin-top: 24px;
        color: #4b5563;
        font-size: 11px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1>10 分钟决策重置表</h1>
    <p>
      这是「决策清晰工具包」的一页免费样张。适合一个选择在脑子里反复打转、
      但迟迟没有变成行动时使用。
    </p>

    <div class="box">
      <div class="label">1. 这个决定，用一句话写清楚</div>
    </div>

    <div class="box large">
      <div class="label">2. 已知事实 vs 关键未知</div>
    </div>

    <div class="box large">
      <div class="label">3. 当前最好的下一步，以及为什么</div>
    </div>

    <div class="box large">
      <div class="label">4. 最大风险和一个预防动作</div>
    </div>

    <div class="box">
      <div class="label">5. 下一步行动和复盘日期</div>
    </div>

    <p class="footer">
      边界：这是自助反思工具，不构成财务、法律、医疗、心理治疗或心理健康建议。
      对重大决定，请结合现实约束并咨询合格专业人士或可信相关方。
    </p>
  </body>
</html>
